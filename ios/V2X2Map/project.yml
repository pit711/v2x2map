name: V2X2Map
options:
  bundleIdPrefix: org.opentrafficmap
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
targets:
  V2X2Map:
    type: application
    platform: iOS
    sources:
      - path: V2X2Map
      - path: ../V2XCore/Sources/V2XCore
        name: V2XCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.v2x2map
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: NLU2H7YNRC
    info:
      path: V2X2Map/Info.plist
      properties:
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UIBackgroundModes: [bluetooth-central, location]
        NSBluetoothAlwaysUsageDescription: "Verbindung zum ITS-G5-Empfänger (ESP32-C5) über Bluetooth Low Energy – auch im Hintergrund während des Empfangs."
        NSLocationWhenInUseUsageDescription: "Zeigt deine Position auf der Karte und zeichnet optional deine Route auf – auch im Hintergrund während einer Empfangs-Sitzung."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
  V2X2MapUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: V2X2MapUITests
    dependencies:
      - target: V2X2Map
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.opentrafficmap.receiver.ios.uitests
        TEST_TARGET_NAME: V2X2Map
        GENERATE_INFOPLIST_FILE: YES
schemes:
  V2X2Map:
    build:
      targets:
        V2X2Map: all
        V2X2MapUITests: [test]
    test:
      targets:
        - V2X2MapUITests
    run:
      config: Debug
